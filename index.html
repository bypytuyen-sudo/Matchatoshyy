<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Matcha Chill</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

/* HEADER */
header {
    background: #2e8b57;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
    background: #c7f0d8;
}

.hero h2 {
    font-size: 36px;
}

button {
    padding: 10px 20px;
    background: #2e8b57;
    color: white;
    border: none;
    cursor: pointer;
}

/* PRODUCTS */
.products {
    padding: 40px;
    text-align: center;
}

.product {
    display: inline-block;
    width: 200px;
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

/* FOOTER */
footer {
    background: #2e8b57;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>

</head>

<body>

<header>
    <h1>Matcha Chill</h1>
    <nav>
        <a href="#">Trang chủ</a>
        <a href="#">Sản phẩm</a>
        <a href="#">Liên hệ</a>
    </nav>
</header>

<section class="hero">
    <h2>Chill cùng Matcha mỗi ngày</h2>
    <p>Healthy – Trẻ trung – Tươi mát</p>
    <a href="https://m.me/yourfacebook">
        <button>Mua ngay</button>
    </a>
</section>

<section class="products">
    <h2>Sản phẩm nổi bật</h2>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1558160074-4d7d8bdf4256">
        <h3>Matcha Latte</h3>
        <p>45.000đ</p>
        <button>Mua</button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1570197788417-0e82375c9371">
        <h3>Matcha Đá Xay</h3>
        <p>55.000đ</p>
        <button>Mua</button>
    </div>

</section>

<footer>
    <p>© 2026 Matcha Chill</p>
</footer>

</body>
</html>
